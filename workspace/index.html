<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFrame Workspace | Route Planning</title>
  <meta name="description" content="Plan a route on the left and preview the generated travel video on the right." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <a class="workspace-brand" href="../" aria-label="TrailFrame home">
        <span class="brand-mark" aria-hidden="true">
          <span class="brand-orb"></span>
          <span class="brand-grid"></span>
        </span>
        <div class="workspace-brand-copy">
          <div class="brand-copy">
            <strong class="brand-wordmark" aria-label="TrailFrame">
              <span class="brand-wordmark-trail">Trail</span>
              <span class="brand-wordmark-frame">Frame</span>
            </strong>
          </div>
          <p class="workspace-brand-note">路线，一键成片</p>
        </div>
      </a>

      <div class="header-actions">
        <div id="creditsBadge" class="credits-badge" data-state="loading" aria-live="polite" aria-label="Loading credits">
          <span class="credits-badge-icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" focusable="false" aria-hidden="true" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z" />
            </svg>
          </span>
          <span class="credits-badge-copy">
            <span class="credits-badge-label">Credits</span>
            <strong id="creditsValue">Loading...</strong>
          </span>
        </div>

        <div class="account-menu" id="accountMenuRoot">
          <button id="accountMenuButton" class="account-menu-btn" type="button" aria-haspopup="menu"
            aria-expanded="false" aria-controls="accountMenu">
            <span id="accountAvatar" class="account-avatar" aria-hidden="true">T</span>
            <span id="accountLabel" class="account-label">TrailFrame</span>
            <svg class="account-caret" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>

          <div id="accountMenu" class="account-dropdown" role="menu" hidden>
            <div class="account-meta">
              <strong id="accountMenuTitle">TrailFrame Workspace</strong>
              <span id="accountMenuSubtitle">你的路线项目已准备就绪。</span>
            </div>
            <button id="accountSignOutBtn" type="button" class="account-item" role="menuitem">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar-card">
        <div class="planner-header">
          <h2>Route Planning</h2>
          <p>Start with one place, then add stops as you shape the journey.</p>
        </div>

        <div class="planner-shell">
          <div id="routeTimeline">
            <div class="timeline-row" data-role="start">
              <span class="row-order" aria-hidden="true">1</span>
              <div class="timeline-row-main">
                <div class="row-display-shell">
                  <button type="button" class="row-display-card" aria-label="Edit stop">
                    <strong class="row-display-title">北京</strong>
                    <span class="row-display-meta">🇨🇳 中国</span>
                  </button>
                  <div class="row-card-actions">
                    <button type="button" class="row-card-action" data-action="edit" aria-label="Re-enter stop">
                      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
                      </svg>
                    </button>
                    <button type="button" class="row-card-action danger" data-action="delete" aria-label="Delete stop">
                      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18" />
                        <path d="M8 6V4h8v2" />
                        <path d="M19 6l-1 14H6L5 6" />
                      </svg>
                    </button>
                  </div>
                </div>
                <div class="row-input-wrap">
                  <span class="row-search-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="11" cy="11" r="7"></circle>
                      <path d="m20 20-3.5-3.5"></path>
                    </svg>
                  </span>
                  <input type="text" placeholder="Search city or coordinates" value="北京"
                    data-country="中国" data-country-code="CN" data-coord="116.4074,39.9042" />
                  <div class="row-edit-actions">
                    <button type="button" class="row-edit-confirm" aria-label="Confirm stop">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5" />
                      </svg>
                    </button>
                    <button type="button" class="row-edit-cancel" aria-label="Cancel editing">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <button id="addDestBtn" class="add-destination" type="button">
              <span aria-hidden="true">+</span>
              <span>Add destination</span>
            </button>
          </div>
        </div>

        <div id="sidebarActions" class="sidebar-actions">
          <button id="generateBtn" class="generate-btn" type="button">Generate Route</button>
        </div>
      </aside>

      <section class="map-section">
        <div class="preview-shell">
          <div class="preview-topbar">
            <span id="previewRouteLabel" class="coordinate-pill">北京</span>
          </div>

          <div class="preview-board">
            <div id="globeContainer" class="map-render" aria-label="Travel preview">
              <div id="arrivalCard" class="arrival-card">
                <span class="arrival-chip">Arrived</span>
                <p class="arrival-city" id="arrivalCity">北京</p>
                <p class="arrival-country" id="arrivalCountry">中国</p>
                <p class="arrival-km" id="arrivalKm">+12454 km</p>
              </div>
            </div>
          </div>

          <div class="player-controls">
            <button id="playBtn" class="player-btn active" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                stroke="none">
                <polygon points="6 3 20 12 6 21 6 3" />
              </svg>
              Replay
            </button>

            <button id="exportBtn" class="player-btn" type="button" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Export
            </button>

            <span class="control-divider" aria-hidden="true"></span>

            <div class="speed-control">
              <button id="speedBtn" class="player-btn speed-btn" type="button" aria-haspopup="menu"
                aria-expanded="false" aria-controls="speedMenu">
                <span class="speed-btn-label">x1</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  aria-hidden="true">
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div id="speedMenu" class="speed-menu" role="menu" hidden>
                <button type="button" class="speed-option active" data-rate="1" role="menuitemradio"
                  aria-checked="true">x1</button>
                <button type="button" class="speed-option" data-rate="2" role="menuitemradio"
                  aria-checked="false">x2</button>
                <button type="button" class="speed-option" data-rate="4" role="menuitemradio"
                  aria-checked="false">x4</button>
              </div>
            </div>

            <span class="control-divider" aria-hidden="true"></span>

            <button id="basemapBtn" class="player-btn basemap-btn" type="button" data-basemap="satellite">REMOTION
              PREVIEW</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
