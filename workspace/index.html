<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFrame Workspace | Route Planning</title>
  <meta
    name="description"
    content="Plan a route on the left and preview the generated travel video on the right."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <a class="home-link" href="../" aria-label="Back to home">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5" />
          <path d="M5 9.8V21h14V9.8" />
        </svg>
        <span class="home-link-label">Home</span>
      </a>

      <a class="workspace-brand" href="../" aria-label="TrailFrame home">
        <span class="brand-mark" aria-hidden="true">
          <span class="brand-orb"></span>
          <span class="brand-grid"></span>
        </span>
        <div class="workspace-brand-copy">
          <div class="brand-copy">
            <strong class="brand-wordmark" aria-label="TrailFrame">
              <span class="brand-wordmark-trail">Trail</span>
              <span class="brand-wordmark-frame">Frame</span>
            </strong>
          </div>
          <p class="workspace-brand-note">路线，一键成片</p>
        </div>
      </a>

      <div class="header-actions">
        <div id="creditsBadge" class="credits-badge" data-state="available" aria-live="polite">
          <span class="credits-badge-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" focusable="false" aria-hidden="true">
              <circle cx="16" cy="16" r="8.5" />
            </svg>
          </span>
          <span class="credits-badge-copy">
            <span class="credits-badge-label">Credits</span>
            <strong id="creditsValue">12 left</strong>
          </span>
        </div>

        <div class="account-menu" id="accountMenuRoot">
          <button
            id="accountMenuButton"
            class="account-menu-btn"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="accountMenu"
          >
            <span id="accountAvatar" class="account-avatar" aria-hidden="true">T</span>
            <span id="accountLabel" class="account-label">TrailFrame</span>
            <svg class="account-caret" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>

          <div id="accountMenu" class="account-dropdown" role="menu" hidden>
            <div class="account-meta">
              <strong id="accountMenuTitle">TrailFrame Workspace</strong>
              <span id="accountMenuSubtitle">你的路线项目已准备就绪。</span>
            </div>
            <button id="accountHomeBtn" type="button" class="account-item" role="menuitem">Back Home</button>
            <button id="accountSignOutBtn" type="button" class="account-item" role="menuitem">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar-card">
        <div class="planner-header">
          <h2>Route Planning</h2>
          <p>Start with one place, then add stops as you shape the journey.</p>
        </div>

        <div class="planner-shell">
          <div id="routeTimeline">
            <div class="timeline-row" data-role="start">
              <span class="pin start-pin" aria-hidden="true"></span>
              <div class="row-input-wrap">
                <input type="text" placeholder="Start" value="New York, USA" data-country="UNITED STATES" data-coord="-74.006,40.7128" />
              </div>
            </div>

            <button id="addDestBtn" class="add-destination" type="button">
              <span aria-hidden="true">+</span>
              <span>Add destination</span>
            </button>
          </div>
        </div>

        <div id="sidebarActions" class="sidebar-actions">
          <button id="generateBtn" class="generate-btn" type="button">Generate Route</button>
        </div>
      </aside>

      <section class="map-section">
        <div class="preview-shell">
          <div class="preview-topbar">
            <span id="previewRouteLabel" class="coordinate-pill">NEW YORK → KIZIMKAZI</span>
          </div>

          <div class="preview-board">
            <div id="globeContainer" class="map-render" aria-label="Travel preview">
              <div id="arrivalCard" class="arrival-card">
                <span class="arrival-chip">Arrived</span>
                <p class="arrival-city" id="arrivalCity">NEW YORK</p>
                <p class="arrival-country" id="arrivalCountry">UNITED STATES</p>
                <p class="arrival-km" id="arrivalKm">+12454 km</p>
              </div>
            </div>
          </div>

          <div class="player-controls">
            <button id="playBtn" class="player-btn active" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                stroke="none">
                <polygon points="6 3 20 12 6 21 6 3" />
              </svg>
              Replay
            </button>

            <button id="exportBtn" class="player-btn" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Export
            </button>

            <span class="control-divider" aria-hidden="true"></span>

            <div class="speed-control">
              <button
                id="speedBtn"
                class="player-btn speed-btn"
                type="button"
                aria-haspopup="menu"
                aria-expanded="false"
                aria-controls="speedMenu"
              >
                <span class="speed-btn-label">x1</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div id="speedMenu" class="speed-menu" role="menu" hidden>
                <button type="button" class="speed-option active" data-rate="1" role="menuitemradio" aria-checked="true">x1</button>
                <button type="button" class="speed-option" data-rate="2" role="menuitemradio" aria-checked="false">x2</button>
                <button type="button" class="speed-option" data-rate="4" role="menuitemradio" aria-checked="false">x4</button>
              </div>
            </div>

            <span class="control-divider" aria-hidden="true"></span>

            <button id="basemapBtn" class="player-btn basemap-btn" type="button" data-basemap="satellite">REMOTION PREVIEW</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
